spring:
  # ── 데이터베이스 연결 설정 ──────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/chess_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: dongyang
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA 설정 (Java ↔ DB 연결 도구) ─────────────────
  jpa:
    hibernate:
      ddl-auto: update      # 엔티티 클래스 보고 테이블 자동 생성/수정
    show-sql: true          # 실행되는 SQL을 콘솔에 출력
    properties:
      hibernate:
        format_sql: true    # SQL 보기 좋게 출력

# ── 서버 포트 설정 ──────────────────────────────────
server:
  port: 8080

# ── JWT 토큰 설정 (로그인 인증용) ───────────────────
jwt:
  secret: chess-secret-key-please-change-this-in-production-must-be-long
  expiration: 86400000      # 토큰 유효시간: 24시간 (밀리초)